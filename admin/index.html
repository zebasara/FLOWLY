<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOVE · Panel de Administración</title>
  <style>
    :root {
      --bg:      #0A120A;
      --card:    #111A11;
      --card2:   #182018;
      --accent:  #7EE621;
      --accent2: #E6A021;
      --text:    #E8F0E8;
      --muted:   #6B8A6B;
      --border:  #243024;
      --danger:  #E65C5C;
      --success: #4CAF50;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0;
    }
    /* Auth screen */
    #auth-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    #auth-screen h1 { font-size: 28px; color: var(--accent); margin-bottom: 8px; }
    #auth-screen p  { color: var(--muted); margin-bottom: 32px; text-align: center; }
    #btn-google {
      background: var(--accent); color: #000; font-size: 15px; font-weight: 700;
      border: none; border-radius: 10px; padding: 14px 32px; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
    }
    #btn-google:hover { opacity: 0.9; }
    /* Main layout */
    #app { display: none; }
    nav {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 24px; display: flex; align-items: center;
      justify-content: space-between; height: 56px;
    }
    nav .logo { color: var(--accent); font-size: 18px; font-weight: 700; }
    nav .user  { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 12px; }
    #btn-signout {
      background: var(--card2); color: var(--danger); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px;
    }
    main { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
    h2 { font-size: 20px; color: var(--text); margin-bottom: 20px; }
    .section { margin-bottom: 40px; }
    .section-title {
      font-size: 11px; font-weight: 600; letter-spacing: 1px;
      color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
    }
    /* Cards */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px; margin-bottom: 12px;
    }
    .card-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 5px; }
    input, select {
      background: var(--card2); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 10px 12px; font-size: 14px; width: 100%;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }
    .field { flex: 1; min-width: 140px; }
    .btn {
      padding: 10px 20px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-primary  { background: var(--accent); color: #000; }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-secondary {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn:hover { opacity: 0.88; }
    /* Badge */
    .tag {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .tag-green  { background: rgba(126,230,33,.12); color: var(--accent); }
    .tag-amber  { background: rgba(230,160,33,.12); color: var(--accent2); }
    .tag-red    { background: rgba(230,92,92,.12);  color: var(--danger); }
    /* Products table */
    .products-list { display: flex; flex-direction: column; gap: 10px; }
    .product-card {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 20px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .product-card .prod-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; min-width: 160px; }
    .product-card .prod-detail { font-size: 12px; color: var(--muted); }
    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--card); border: 1px solid var(--accent);
      color: var(--accent); padding: 12px 24px; border-radius: 10px;
      font-size: 14px; display: none; z-index: 999;
    }
    /* Separator */
    hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .loading { color: var(--muted); text-align: center; padding: 40px; font-size: 14px; }
  </style>
</head>
<body>

<!-- Pantalla de login -->
<div id="auth-screen">
  <h1>🌿 MOVE Admin</h1>
  <p>Panel de administración. Iniciá sesión con tu cuenta de Google autorizada.</p>
  <button id="btn-google">
    <span>G</span> Iniciar sesión con Google
  </button>
</div>

<!-- App principal -->
<div id="app">
  <nav>
    <span class="logo">🌿 MOVE Admin</span>
    <span class="user">
      <span id="user-email"></span>
      <button id="btn-signout" class="btn btn-secondary">Cerrar sesión</button>
    </span>
  </nav>

  <main>
    <h2>Panel de administración</h2>

    <!-- Configuración general -->
    <div class="section">
      <div class="section-title">configuración general</div>
      <div class="card">
        <div class="card-row">
          <div class="field">
            <label>Umbral de usuarios para abrir la tienda</label>
            <input type="number" id="umbral" min="1" placeholder="500" />
          </div>
          <div style="padding-top:20px">
            <button class="btn btn-primary" onclick="saveUmbral()">Guardar</button>
          </div>
        </div>
        <hr/>
        <p style="font-size:12px; color:var(--muted)">
          Usuarios actuales: <strong id="user-count" style="color:var(--accent)">…</strong>
        </p>
      </div>
    </div>

    <!-- Productos -->
    <div class="section">
      <div class="section-title">productos de la tienda</div>

      <div class="card">
        <p style="font-size:13px; font-weight:600; margin-bottom:14px;">Agregar / Editar producto</p>
        <div class="card-row">
          <div class="field">
            <label>ID del producto</label>
            <input type="text" id="prod-id" placeholder="cash_500" />
          </div>
          <div class="field">
            <label>Nombre</label>
            <input type="text" id="prod-nombre" placeholder="$500 ARS" />
          </div>
        </div>
        <div class="card-row" style="margin-top:10px">
          <div class="field">
            <label>Descripción</label>
            <input type="text" id="prod-desc" placeholder="Transferencia Mercado Pago" />
          </div>
          <div class="field">
            <label>Label del monto</label>
            <input type="text" id="prod-monto-label" placeholder="$500" />
          </div>
        </div>
        <div class="card-row" style="margin-top:10px">
          <div class="field">
            <label>MOVE requerido</label>
            <input type="number" id="prod-move" placeholder="5000" min="0" />
          </div>
          <div class="field">
            <label>Categoría</label>
            <select id="prod-cat">
              <option value="cash">cash (dinero)</option>
              <option value="gift">gift (regalo)</option>
              <option value="promo">promo (descuento)</option>
            </select>
          </div>
          <div class="field">
            <label>Activo</label>
            <select id="prod-activo">
              <option value="true">Sí</option>
              <option value="false">No</option>
            </select>
          </div>
        </div>
        <div style="margin-top:14px; display:flex; gap:10px;">
          <button class="btn btn-primary" onclick="saveProduct()">Guardar producto</button>
          <button class="btn btn-secondary" onclick="clearProductForm()">Limpiar</button>
        </div>
      </div>

      <!-- Lista de productos -->
      <div class="section-title" style="margin-top:20px;">productos guardados</div>
      <div class="products-list" id="products-list">
        <div class="loading">Cargando…</div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<!-- Firebase JS SDK v10 (CDN) -->
<script type="module">
  import { initializeApp }          from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, deleteDoc }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { getCountFromServer, query }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  // ── IMPORTANTE: reemplazá estos valores con los de tu Firebase ──────────
  const firebaseConfig = {
    apiKey:            "REEMPLAZA_CON_TU_API_KEY",
    authDomain:        "REEMPLAZA.firebaseapp.com",
    projectId:         "REEMPLAZA_CON_TU_PROJECT_ID",
    storageBucket:     "REEMPLAZA.appspot.com",
    messagingSenderId: "REEMPLAZA",
    appId:             "REEMPLAZA_CON_TU_APP_ID"
  };
  // ────────────────────────────────────────────────────────────────────────

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const storeRef = doc(db, 'config', 'store');

  // ── Auth ────────────────────────────────────────────────────────────────

  document.getElementById('btn-google').onclick = async () => {
    const provider = new GoogleAuthProvider();
    try { await signInWithPopup(auth, provider); }
    catch (e) { alert('Error al iniciar sesión: ' + e.message); }
  };

  document.getElementById('btn-signout').onclick = () => signOut(auth);

  onAuthStateChanged(auth, async user => {
    if (user) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display         = 'block';
      document.getElementById('user-email').textContent    = user.email;
      await loadConfig();
      await loadUserCount();
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app').style.display         = 'none';
    }
  });

  // ── Config ──────────────────────────────────────────────────────────────

  let currentConfig = { umbralUsuarios: 500, productos: [] };

  async function loadConfig() {
    try {
      const snap = await getDoc(storeRef);
      if (snap.exists()) {
        currentConfig = snap.data();
      }
      document.getElementById('umbral').value = currentConfig.umbralUsuarios || 500;
      renderProducts(currentConfig.productos || []);
    } catch (e) {
      showToast('Error al cargar config: ' + e.message, true);
    }
  }

  async function loadUserCount() {
    try {
      const usersCol = collection(db, 'usuarios');
      const snapshot = await getCountFromServer(query(usersCol));
      document.getElementById('user-count').textContent = snapshot.data().count;
    } catch (e) {
      document.getElementById('user-count').textContent = '–';
    }
  }

  // ── Umbral ──────────────────────────────────────────────────────────────

  window.saveUmbral = async () => {
    const val = parseInt(document.getElementById('umbral').value) || 500;
    try {
      await setDoc(storeRef, { ...currentConfig, umbralUsuarios: val });
      currentConfig.umbralUsuarios = val;
      showToast('Umbral guardado ✓');
    } catch (e) {
      showToast('Error: ' + e.message, true);
    }
  };

  // ── Productos ───────────────────────────────────────────────────────────

  function renderProducts(products) {
    const list = document.getElementById('products-list');
    if (!products || products.length === 0) {
      list.innerHTML = '<p style="color:var(--muted); font-size:13px;">No hay productos guardados.</p>';
      return;
    }
    list.innerHTML = products.map((p, i) => `
      <div class="product-card">
        <div>
          <div class="prod-name">${p.nombre}</div>
          <div class="prod-detail">ID: ${p.id} · ${p.moveRequerido?.toLocaleString()} MOVE · ${p.categoria}</div>
        </div>
        <span class="tag ${p.activo ? 'tag-green' : 'tag-red'}">${p.activo ? 'Activo' : 'Inactivo'}</span>
        <button class="btn btn-secondary" onclick="editProduct(${i})" style="font-size:12px; padding:6px 12px;">Editar</button>
        <button class="btn btn-danger"    onclick="deleteProduct(${i})" style="font-size:12px; padding:6px 12px;">Eliminar</button>
      </div>
    `).join('');
  }

  window.saveProduct = async () => {
    const id     = document.getElementById('prod-id').value.trim();
    const nombre = document.getElementById('prod-nombre').value.trim();
    const desc   = document.getElementById('prod-desc').value.trim();
    const label  = document.getElementById('prod-monto-label').value.trim();
    const move   = parseInt(document.getElementById('prod-move').value) || 0;
    const cat    = document.getElementById('prod-cat').value;
    const activo = document.getElementById('prod-activo').value === 'true';

    if (!id || !nombre) { showToast('ID y nombre son obligatorios', true); return; }

    const nuevo = { id, nombre, descripcion: desc, montoLabel: label, moveRequerido: move, categoria: cat, activo };
    const prods = [...(currentConfig.productos || [])];
    const idx   = prods.findIndex(p => p.id === id);
    if (idx >= 0) prods[idx] = nuevo; else prods.push(nuevo);

    try {
      await setDoc(storeRef, { ...currentConfig, productos: prods });
      currentConfig.productos = prods;
      renderProducts(prods);
      clearProductForm();
      showToast('Producto guardado ✓');
    } catch (e) {
      showToast('Error: ' + e.message, true);
    }
  };

  window.editProduct = (i) => {
    const p = currentConfig.productos[i];
    document.getElementById('prod-id').value          = p.id || '';
    document.getElementById('prod-nombre').value      = p.nombre || '';
    document.getElementById('prod-desc').value        = p.descripcion || '';
    document.getElementById('prod-monto-label').value = p.montoLabel || '';
    document.getElementById('prod-move').value        = p.moveRequerido || 0;
    document.getElementById('prod-cat').value         = p.categoria || 'cash';
    document.getElementById('prod-activo').value      = String(p.activo !== false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.deleteProduct = async (i) => {
    if (!confirm('¿Eliminar este producto?')) return;
    const prods = [...(currentConfig.productos || [])];
    prods.splice(i, 1);
    try {
      await setDoc(storeRef, { ...currentConfig, productos: prods });
      currentConfig.productos = prods;
      renderProducts(prods);
      showToast('Producto eliminado');
    } catch (e) {
      showToast('Error: ' + e.message, true);
    }
  };

  window.clearProductForm = () => {
    ['prod-id','prod-nombre','prod-desc','prod-monto-label','prod-move'].forEach(
      id => document.getElementById(id).value = ''
    );
    document.getElementById('prod-cat').value    = 'cash';
    document.getElementById('prod-activo').value = 'true';
  };

  // ── Toast ───────────────────────────────────────────────────────────────

  function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    t.style.borderColor = error ? 'var(--danger)' : 'var(--accent)';
    t.style.color       = error ? 'var(--danger)' : 'var(--accent)';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOVE · Panel de Administración</title>
  <style>
    :root {
      --bg:      #0A120A;
      --card:    #111A11;
      --card2:   #182018;
      --accent:  #7EE621;
      --accent2: #E6A021;
      --text:    #E8F0E8;
      --muted:   #6B8A6B;
      --border:  #243024;
      --danger:  #E65C5C;
      --success: #4CAF50;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    #auth-screen { display: flex; flex-direction: column; align-items: center;
                   justify-content: center; min-height: 100vh; padding: 24px; }
    #auth-screen h1 { font-size: 28px; color: var(--accent); margin-bottom: 8px; }
    #auth-screen p  { color: var(--muted); margin-bottom: 32px; text-align: center; }
    #btn-google { background: var(--accent); color: #000; font-size: 15px; font-weight: 700;
                  border: none; border-radius: 10px; padding: 14px 32px; cursor: pointer; }
    #btn-google:hover { opacity: 0.9; }

    #app { display: none; }
    nav  { background: var(--card); border-bottom: 1px solid var(--border);
           padding: 0 24px; display: flex; align-items: center;
           justify-content: space-between; height: 56px; }
    nav .logo { color: var(--accent); font-size: 18px; font-weight: 700; }
    nav .user  { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 12px; }
    #btn-signout { background: var(--card2); color: var(--danger);
                   border: 1px solid var(--border); border-radius: 8px;
                   padding: 6px 12px; cursor: pointer; font-size: 13px; }

    main { max-width: 960px; margin: 0 auto; padding: 32px 20px; }
    h2   { font-size: 20px; color: var(--text); margin-bottom: 20px; }
    .section { margin-bottom: 40px; }
    .section-title { font-size: 11px; font-weight: 600; letter-spacing: 1px;
                     color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
    .card  { background: var(--card); border: 1px solid var(--border);
             border-radius: 14px; padding: 20px; margin-bottom: 12px; }
    .card-row { display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 5px; }
    input, select, textarea {
      background: var(--card2); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 10px 12px; font-size: 14px; width: 100%; outline: none; }
    input:focus, select:focus { border-color: var(--accent); }
    .field { flex: 1; min-width: 140px; }
    .btn { padding: 10px 20px; border-radius: 10px; border: none;
           font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-primary   { background: var(--accent); color: #000; }
    .btn-danger    { background: var(--danger); color: #fff; }
    .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-small     { padding: 6px 12px; font-size: 12px; }
    .btn:hover { opacity: 0.88; }

    .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .tag-green { background: rgba(126,230,33,.12); color: var(--accent); }
    .tag-amber { background: rgba(230,160,33,.12); color: var(--accent2); }
    .tag-red   { background: rgba(230,92,92,.12);  color: var(--danger); }

    /* Productos */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .product-card  {
      background: var(--card2); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .product-img  { width: 100%; height: 120px; object-fit: cover; background: var(--card);
                    display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-body  { padding: 14px; flex: 1; }
    .product-name  { font-size: 14px; font-weight: 600; color: var(--text); }
    .product-detail { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .product-price  { font-size: 16px; font-weight: 700; color: var(--accent); margin-top: 8px; }
    .product-actions { padding: 10px 14px; display: flex; gap: 8px; border-top: 1px solid var(--border); }

    hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .loading { color: var(--muted); text-align: center; padding: 40px; font-size: 14px; }

    /* Upload progress */
    .upload-progress { margin-top: 8px; height: 4px; background: var(--border);
                       border-radius: 2px; overflow: hidden; display: none; }
    .upload-progress-bar { height: 100%; background: var(--accent); transition: width .2s; }

    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
             background: var(--card); border: 1px solid var(--accent); color: var(--accent);
             padding: 12px 24px; border-radius: 10px; font-size: 14px;
             display: none; z-index: 999; }
  </style>
</head>
<body>

<div id="auth-screen">
  <h1>🌿 MOVE Admin</h1>
  <p>Panel de administración. Iniciá sesión con tu cuenta de Google autorizada.</p>
  <button id="btn-google">Iniciar sesión con Google</button>
</div>

<div id="app">
  <nav>
    <span class="logo">🌿 MOVE Admin</span>
    <span class="user">
      <span id="user-email"></span>
      <button id="btn-signout" class="btn btn-secondary btn-small">Cerrar sesión</button>
    </span>
  </nav>

  <main>
    <h2>Panel de administración</h2>

    <!-- Configuración general -->
    <div class="section">
      <div class="section-title">configuración general</div>
      <div class="card">
        <div class="card-row">
          <div class="field">
            <label>Umbral de usuarios para abrir la tienda</label>
            <input type="number" id="umbral" min="1" placeholder="500" />
          </div>
          <div style="padding-top:22px">
            <button class="btn btn-primary" onclick="saveUmbral()">Guardar</button>
          </div>
        </div>
        <hr/>
        <p style="font-size:12px; color:var(--muted)">
          Usuarios actuales: <strong id="user-count" style="color:var(--accent)">…</strong>
        </p>
      </div>
    </div>

    <!-- Formulario Producto -->
    <div class="section">
      <div class="section-title">agregar / editar producto</div>
      <div class="card">
        <div class="card-row">
          <div class="field">
            <label>ID del producto *</label>
            <input type="text" id="prod-id" placeholder="cash_500" />
          </div>
          <div class="field">
            <label>Nombre *</label>
            <input type="text" id="prod-nombre" placeholder="$500 ARS" />
          </div>
        </div>
        <div class="card-row" style="margin-top:10px">
          <div class="field">
            <label>Descripción</label>
            <input type="text" id="prod-desc" placeholder="Transferencia Mercado Pago" />
          </div>
          <div class="field">
            <label>Label del monto</label>
            <input type="text" id="prod-monto-label" placeholder="$500" />
          </div>
        </div>
        <div class="card-row" style="margin-top:10px">
          <div class="field">
            <label>MOVE requerido</label>
            <input type="number" id="prod-move" placeholder="5000" min="0" />
          </div>
          <div class="field">
            <label>Categoría</label>
            <select id="prod-cat">
              <option value="cash">💸 cash (dinero)</option>
              <option value="gift">🎁 gift (regalo)</option>
              <option value="promo">🏷️ promo (descuento)</option>
            </select>
          </div>
          <div class="field">
            <label>Activo</label>
            <select id="prod-activo">
              <option value="true">✅ Sí</option>
              <option value="false">❌ No</option>
            </select>
          </div>
        </div>

        <!-- Imagen del producto -->
        <div style="margin-top:12px">
          <label>Imagen del producto</label>
          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap">
            <input type="file" id="prod-imagen" accept="image/*"
                   style="flex:1; min-width:200px" onchange="previewImage(event)" />
            <div id="prod-imagen-preview"
                 style="width:80px;height:60px;border-radius:8px;overflow:hidden;
                        background:var(--card);display:flex;align-items:center;
                        justify-content:center;font-size:24px;border:1px solid var(--border)">
              📦
            </div>
          </div>
          <div class="upload-progress" id="upload-progress">
            <div class="upload-progress-bar" id="upload-bar"></div>
          </div>
          <p id="current-imagen-url" style="font-size:11px;color:var(--muted);margin-top:4px"></p>
        </div>

        <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap">
          <button class="btn btn-primary" onclick="saveProduct()">Guardar producto</button>
          <button class="btn btn-secondary" onclick="clearProductForm()">Limpiar</button>
        </div>
      </div>
    </div>

    <!-- Lista de productos -->
    <div class="section">
      <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>productos guardados</span>
        <button class="btn btn-secondary btn-small" onclick="loadConfig()">↺ Actualizar</button>
      </div>
      <div class="products-grid" id="products-list">
        <div class="loading">Cargando…</div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, doc, getDoc, setDoc, collection }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { getCountFromServer, query }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyAuDS7u683ge-HxVJpUfMHNJ3Al1XJT5-U",
    authDomain:        "flowly-be00e.firebaseapp.com",
    projectId:         "flowly-be00e",
    storageBucket:     "flowly-be00e.firebasestorage.app",
    messagingSenderId: "630993807429",
    appId:             "1:630993807429:web:7f483cc6bd23bd38d25b2c",
    measurementId:     "G-982YG53L7J"
  };

  const app     = initializeApp(firebaseConfig);
  const auth    = getAuth(app);
  const db      = getFirestore(app);
  const storage = getStorage(app);
  const storeRef = doc(db, 'config', 'store');

  // ── Productos por defecto ──────────────────────────────────────────────
  const DEFAULT_PRODUCTS = [
    { id:'cash_500',     nombre:'$500 ARS',    descripcion:'Transferencia vía Mercado Pago', moveRequerido:5000,  montoLabel:'$500',   categoria:'cash',  activo:true,  imagenUrl:'' },
    { id:'cash_1000',    nombre:'$1.000 ARS',  descripcion:'Transferencia vía Mercado Pago', moveRequerido:9500,  montoLabel:'$1.000', categoria:'cash',  activo:true,  imagenUrl:'' },
    { id:'cash_2000',    nombre:'$2.000 ARS',  descripcion:'Transferencia vía Mercado Pago', moveRequerido:18000, montoLabel:'$2.000', categoria:'cash',  activo:true,  imagenUrl:'' },
    { id:'gift_cafe',    nombre:'Café gratis',  descripcion:'Voucher en locales adheridos',   moveRequerido:3000,  montoLabel:'Voucher', categoria:'gift', activo:true,  imagenUrl:'' },
    { id:'gift_desc',    nombre:'10% descuento',descripcion:'En comercios adheridos a MOVE', moveRequerido:1500,  montoLabel:'Promo',  categoria:'promo', activo:true,  imagenUrl:'' },
  ];

  // ── Auth ───────────────────────────────────────────────────────────────
  document.getElementById('btn-google').onclick = async () => {
    try { await signInWithPopup(auth, new GoogleAuthProvider()); }
    catch(e) { alert('Error al iniciar sesión: ' + e.message); }
  };
  document.getElementById('btn-signout').onclick = () => signOut(auth);

  onAuthStateChanged(auth, async user => {
    document.getElementById('auth-screen').style.display = user ? 'none' : 'flex';
    document.getElementById('app').style.display         = user ? 'block' : 'none';
    if (user) {
      document.getElementById('user-email').textContent = user.email;
      await loadConfig();
      await loadUserCount();
    }
  });

  // ── Config ─────────────────────────────────────────────────────────────
  let currentConfig = { umbralUsuarios: 500, productos: [] };

  window.loadConfig = async function() {
    try {
      const snap = await getDoc(storeRef);
      if (snap.exists()) {
        currentConfig = snap.data();
        // Si el doc existe pero no tiene productos, inicializar con defaults
        if (!currentConfig.productos || currentConfig.productos.length === 0) {
          currentConfig.productos = DEFAULT_PRODUCTS;
          await setDoc(storeRef, currentConfig);
          showToast('Productos inicializados con valores por defecto ✓');
        }
      } else {
        // Doc no existe: crear con defaults
        currentConfig = { umbralUsuarios: 500, productos: DEFAULT_PRODUCTS };
        await setDoc(storeRef, currentConfig);
        showToast('Configuración creada con valores por defecto ✓');
      }
      document.getElementById('umbral').value = currentConfig.umbralUsuarios || 500;
      renderProducts(currentConfig.productos || []);
    } catch(e) {
      showToast('Error al cargar config: ' + e.message, true);
    }
  };

  async function loadUserCount() {
    try {
      const snap = await getCountFromServer(query(collection(db, 'usuarios')));
      document.getElementById('user-count').textContent = snap.data().count;
    } catch(e) {
      document.getElementById('user-count').textContent = '–';
    }
  }

  // ── Umbral ─────────────────────────────────────────────────────────────
  window.saveUmbral = async function() {
    const val = parseInt(document.getElementById('umbral').value) || 500;
    try {
      await setDoc(storeRef, { ...currentConfig, umbralUsuarios: val });
      currentConfig.umbralUsuarios = val;
      showToast('Umbral guardado ✓');
    } catch(e) { showToast('Error: ' + e.message, true); }
  };

  // ── Imagen preview ─────────────────────────────────────────────────────
  window.previewImage = function(event) {
    const file = event.target.files[0];
    if (!file) return;
    const preview = document.getElementById('prod-imagen-preview');
    const reader  = new FileReader();
    reader.onload = e => {
      preview.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover"/>`;
    };
    reader.readAsDataURL(file);
  };

  // ── Guardar producto ───────────────────────────────────────────────────
  window.saveProduct = async function() {
    const id     = document.getElementById('prod-id').value.trim();
    const nombre = document.getElementById('prod-nombre').value.trim();
    if (!id || !nombre) { showToast('ID y nombre son obligatorios', true); return; }

    const desc       = document.getElementById('prod-desc').value.trim();
    const label      = document.getElementById('prod-monto-label').value.trim();
    const move       = parseInt(document.getElementById('prod-move').value) || 0;
    const cat        = document.getElementById('prod-cat').value;
    const activo     = document.getElementById('prod-activo').value === 'true';
    const fileInput  = document.getElementById('prod-imagen');
    const file       = fileInput.files[0];
    const currentUrl = document.getElementById('current-imagen-url').dataset.url || '';

    let imagenUrl = currentUrl;

    // Subir imagen si seleccionaron una nueva
    if (file) {
      try {
        imagenUrl = await uploadProductImage(id, file);
      } catch(e) {
        showToast('Error al subir imagen: ' + e.message, true);
        return;
      }
    }

    const nuevo = { id, nombre, descripcion: desc, montoLabel: label,
                    moveRequerido: move, categoria: cat, activo, imagenUrl };
    const prods = [...(currentConfig.productos || [])];
    const idx   = prods.findIndex(p => p.id === id);
    if (idx >= 0) prods[idx] = nuevo; else prods.push(nuevo);

    try {
      await setDoc(storeRef, { ...currentConfig, productos: prods });
      currentConfig.productos = prods;
      renderProducts(prods);
      clearProductForm();
      showToast('Producto guardado ✓');
    } catch(e) { showToast('Error: ' + e.message, true); }
  };

  async function uploadProductImage(prodId, file) {
    return new Promise((resolve, reject) => {
      const ref      = storageRef(storage, `store_products/${prodId}.jpg`);
      const task     = uploadBytesResumable(ref, file);
      const bar      = document.getElementById('upload-bar');
      const progress = document.getElementById('upload-progress');
      progress.style.display = 'block';

      task.on('state_changed',
        snap => {
          const pct = (snap.bytesTransferred / snap.totalBytes) * 100;
          bar.style.width = pct + '%';
        },
        err => { progress.style.display = 'none'; reject(err); },
        async () => {
          progress.style.display = 'none';
          const url = await getDownloadURL(task.snapshot.ref);
          resolve(url);
        }
      );
    });
  }

  // ── Render productos ───────────────────────────────────────────────────
  function renderProducts(products) {
    const list = document.getElementById('products-list');
    if (!products || products.length === 0) {
      list.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:20px 0">No hay productos guardados.</p>';
      return;
    }
    list.innerHTML = products.map((p, i) => {
      const catIcon = p.categoria === 'cash' ? '💸' : p.categoria === 'gift' ? '🎁' : '🏷️';
      const imgHtml = p.imagenUrl
        ? `<img src="${p.imagenUrl}" style="width:100%;height:120px;object-fit:cover"/>`
        : `<div style="width:100%;height:120px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:40px">${catIcon}</div>`;
      return `
        <div class="product-card">
          ${imgHtml}
          <div class="product-body">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span class="product-name">${p.nombre}</span>
              <span class="tag ${p.activo ? 'tag-green' : 'tag-red'}">${p.activo ? 'Activo' : 'Inactivo'}</span>
            </div>
            <div class="product-detail">${p.descripcion || ''}</div>
            <div class="product-price">${(p.moveRequerido || 0).toLocaleString()} MOVE</div>
            <div class="product-detail" style="margin-top:4px">ID: ${p.id} · ${p.categoria}</div>
          </div>
          <div class="product-actions">
            <button class="btn btn-secondary btn-small" style="flex:1" onclick="editProduct(${i})">✏️ Editar</button>
            <button class="btn btn-danger btn-small" onclick="deleteProduct(${i})">🗑️</button>
          </div>
        </div>`;
    }).join('');
  }

  window.editProduct = function(i) {
    const p = currentConfig.productos[i];
    document.getElementById('prod-id').value          = p.id || '';
    document.getElementById('prod-nombre').value      = p.nombre || '';
    document.getElementById('prod-desc').value        = p.descripcion || '';
    document.getElementById('prod-monto-label').value = p.montoLabel || '';
    document.getElementById('prod-move').value        = p.moveRequerido || 0;
    document.getElementById('prod-cat').value         = p.categoria || 'cash';
    document.getElementById('prod-activo').value      = String(p.activo !== false);
    // Mostrar imagen actual
    const urlEl = document.getElementById('current-imagen-url');
    urlEl.dataset.url = p.imagenUrl || '';
    if (p.imagenUrl) {
      urlEl.textContent = '📎 Imagen actual guardada';
      document.getElementById('prod-imagen-preview').innerHTML =
        `<img src="${p.imagenUrl}" style="width:100%;height:100%;object-fit:cover"/>`;
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.deleteProduct = async function(i) {
    const p = currentConfig.productos[i];
    if (!confirm(`¿Eliminar "${p.nombre}"?`)) return;
    const prods = [...(currentConfig.productos || [])];
    prods.splice(i, 1);
    try {
      await setDoc(storeRef, { ...currentConfig, productos: prods });
      currentConfig.productos = prods;
      renderProducts(prods);
      showToast('Producto eliminado');
    } catch(e) { showToast('Error: ' + e.message, true); }
  };

  window.clearProductForm = function() {
    ['prod-id','prod-nombre','prod-desc','prod-monto-label','prod-move']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('prod-cat').value    = 'cash';
    document.getElementById('prod-activo').value = 'true';
    document.getElementById('prod-imagen').value = '';
    document.getElementById('prod-imagen-preview').innerHTML = '📦';
    const urlEl = document.getElementById('current-imagen-url');
    urlEl.textContent = ''; urlEl.dataset.url = '';
  };

  // ── Toast ──────────────────────────────────────────────────────────────
  function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent       = msg;
    t.style.display     = 'block';
    t.style.borderColor = error ? 'var(--danger)' : 'var(--accent)';
    t.style.color       = error ? 'var(--danger)' : 'var(--accent)';
    setTimeout(() => { t.style.display = 'none'; }, 3500);
  }

  window.showToast = showToast;
</script>
</body>
</html>
